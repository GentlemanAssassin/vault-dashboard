<style>

    --text-muted: #4a4a5a;

    --tag-text: #a0a0c0;

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* HEADER */
  header { display: flex; align-items: center; justify-content: space-between; padding: 18px 28px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 100; gap: 16px; flex-wrap: wrap; }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); flex-shrink: 0; }
  .logo span { color: var(--accent); }
  .header-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .search-wrap { position: relative; }
  .search-wrap input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; padding: 7px 12px 7px 32px; width: 200px; outline: none; transition: border-color var(--transition); }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap::before { content: '脙垄脗聦脗聲'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 15px; pointer-events: none; }
  select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; padding: 7px 10px; outline: none; cursor: pointer; }
  select:focus { border-color: var(--accent); }
  .view-toggle { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .view-btn { background: none; border: none; padding: 7px 10px; color: var(--text-dim); cursor: pointer; font-size: 14px; transition: all var(--transition); }
  .view-btn.active { background: var(--accent-soft); color: var(--accent); }
  .add-btn { background: var(--accent); border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: 13px; font-weight: 600; padding: 7px 14px; transition: opacity var(--transition); flex-shrink: 0; }
  .add-btn:hover { opacity: 0.85; }
  .count-badge { font-size: 12px; color: var(--text-dim); }

  /* MAIN */
  main { padding: 24px 28px; max-width: 1600px; margin: 0 auto; }

  /* TAG FILTER BAR */
  .tag-filter-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; align-items: center; }
  .tag-filter-bar .tfl { font-size: 12px; color: var(--text-dim); margin-right: 4px; }
  .filter-tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text-dim); cursor: pointer; font-size: 11px; padding: 3px 10px; transition: all var(--transition); }
  .filter-tag:hover, .filter-tag.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .filter-tag.clear-all { border-color: transparent; color: var(--text-muted); }
  .filter-tag.clear-all:hover { color: var(--text-dim); border-color: var(--border); }

  /* CARD GRID */
  #card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--card-min), 1fr)); gap: 16px; }

  /* CARD */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; gap: 10px; transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition); cursor: default; position: relative; }
  .card:hover { border-color: #3a3a4e; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .card.dragging { opacity: 0.3; transform: scale(0.97); }
  .card.drag-over { border-color: var(--accent) !important; box-shadow: 0 0 0 2px rgba(99,102,241,0.3); }

  .card-header { display: flex; align-items: flex-start; gap: 8px; }
  .drag-handle { cursor: grab; color: var(--text-dim); opacity: 0; transition: opacity var(--transition); padding: 2px 4px; font-size: 16px; user-select: none; flex-shrink: 0; line-height: 1.4; }
  .card:hover .drag-handle { opacity: 0.4; }
  .drag-handle:hover { opacity: 1 !important; color: var(--text); }
  .drag-handle:active { cursor: grabbing; }
  .card-favicon { width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0; object-fit: contain; margin-top: 1px; }
  .card-title-wrap { flex: 1; min-width: 0; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.35; word-break: break-word; }
  .card-title a { color: inherit; text-decoration: none; }
  .card-title a:hover { color: var(--accent); }
  .card-domain { font-size: 11px; color: var(--text-dim); margin-top: 2px; word-break: break-all; }
  .card-actions { display: flex; gap: 6px; flex-shrink: 0; opacity: 0; transition: opacity var(--transition); }
  .card:hover .card-actions { opacity: 1; }
  .icon-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 14px; padding: 3px; border-radius: 5px; line-height: 1; transition: color var(--transition), background var(--transition); }
  .icon-btn:hover { color: var(--text); background: var(--surface2); }

  .card-note { font-size: 12px; color: var(--text-dim); background: var(--surface2); border-radius: 6px; padding: 7px 10px; line-height: 1.45; }

  /* TAGS */
  .card-tags { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; min-height: 26px; }
  .tag { display: inline-flex; align-items: center; gap: 4px; background: var(--tag-bg); border-radius: 10px; color: var(--tag-text); font-size: 11px; padding: 3px 8px; white-space: nowrap; }
  .tag .tag-remove { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; line-height: 1; padding: 0 1px; transition: color var(--transition); }
  .tag .tag-remove:hover { color: #f87171; }
  .tag-add-btn { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 12px; font-size: 11px; background: none; border: 1px dashed var(--border); color: var(--text-muted); cursor: pointer; transition: all var(--transition); opacity: 0; }
  .card:hover .tag-add-btn { opacity: 1; }
  .tag-add-btn:hover { border-color: var(--accent); color: var(--accent); }
  .quick-tag-input-wrap { display: inline-flex; align-items: center; }
  .quick-tag-input { width: 110px; padding: 2px 8px; border: 1px solid var(--accent); border-radius: 10px; background: var(--surface); color: var(--text); font-size: 11px; outline: none; }

  .card-meta { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-muted); margin-top: auto; padding-top: 4px; }
  .card-type-badge { background: var(--surface2); border-radius: 6px; padding: 2px 7px; font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

  /* LIST VIEW */
  #card-grid.list-view { display: flex; flex-direction: column; gap: 8px; }
  #card-grid.list-view .card { flex-direction: row; align-items: center; padding: 12px 16px; gap: 14px; flex-wrap: wrap; }
  #card-grid.list-view .card-header { flex: 1; min-width: 200px; }
  #card-grid.list-view .card-tags { flex: 1; min-width: 180px; }
  #card-grid.list-view .card-note { flex: 1; min-width: 140px; margin: 0; }
  #card-grid.list-view .card-meta { flex-shrink: 0; }
  #card-grid.list-view .drag-handle { opacity: 0.3; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 80px 20px; color: var(--text-dim); }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 100%; max-width: 480px; }
  .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-weight: 500; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; padding: 9px 12px; outline: none; transition: border-color var(--transition); font-family: inherit; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
  .btn-secondary { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; font-size: 13px; font-weight: 600; padding: 8px 16px; transition: border-color var(--transition); }
  .btn-secondary:hover { border-color: var(--text-dim); }
  .btn-primary { background: var(--accent); border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: 13px; font-weight: 600; padding: 8px 16px; transition: opacity var(--transition); }

  .tags-inline-input { background: none; border: none; color: var(--text); font-size: 12px; outline: none; min-width: 80px; flex: 1; }

function getDomain(url) {
  try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return ''; }
}

function getFaviconUrl(url) {
  const domain = getDomain(url);
  if (!domain) return '';
  return `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
}

function formatDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  if (!y || !m || !day) return d;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${parseInt(day)}, ${y}`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

// 脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙 FILTER / SORT 脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙
function getFiltered() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const sort = document.getElementById('sort-select').value;

  let filtered = items.filter(item => {
    const matchesSearch = !q || [item.title, item.url, item.note, ...(item.tags||[])].some(v => v && v.toLowerCase().includes(q));
    const matchesTag = !activeTagFilter || (item.tags||[]).includes(activeTagFilter);
    return matchesSearch && matchesTag;
  });

  if (sort === 'custom') {
    if (customOrder) {
      filtered.sort((a, b) => {
        const ai = customOrder.indexOf(a.id);
        const bi = customOrder.indexOf(b.id);
        if (ai === -1) return 1;
        if (bi === -1) return -1;
        return ai - bi;
      });
    }
  } else if (sort === 'dateAdded-desc') {
    filtered.sort((a, b) => (b.dateAdded || '').localeCompare(a.dateAdded || ''));
  } else if (sort === 'dateAdded-asc') {
    filtered.sort((a, b) => (a.dateAdded || '').localeCompare(b.dateAdded || ''));
  } else if (sort === 'dateOfPost-desc') {
    filtered.sort((a, b) => (b.dateOfPost || '').localeCompare(a.dateOfPost || ''));
  } else if (sort === 'dateOfPost-asc') {
    filtered.sort((a, b) => (a.dateOfPost || '').localeCompare(b.dateOfPost || ''));
  } else if (sort === 'title-asc') {
    filtered.sort((a, b) => a.title.localeCompare(b.title));
  }

  return filtered;
}

// 脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙 TAG FILTER BAR 脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙
function buildTagFilterBar() {
  const allTags = {};
  items.forEach(item => (item.tags||[]).forEach(t => { allTags[t] = (allTags[t]||0) + 1; }));
  const sorted = Object.entries(allTags).sort((a,b) => b[1]-a[1]).map(e=>e[0]);

  const bar = document.getElementById('tag-filter-bar');
  if (!sorted.length) { bar.innerHTML = ''; return; }

  let html = '<span class="tfl">Filter:</span>';
  if (activeTagFilter) {
    html += `<button class="filter-tag clear-all" onclick="clearTagFilter()">脙垄脗聹脗聲 Clear</button>`;
  }
  sorted.forEach(tag => {
    const active = activeTagFilter === tag ? ' active' : '';
    html += `<button class="filter-tag${active}" onclick="setTagFilter('${escHtml(tag)}')">${escHtml(tag)}</button>`;
  });

  // also populate tag filter select
  const sel = document.getElementById('tag-filter-select');
  const prev = sel.value;
  sel.innerHTML = '<option value="">All tags</option>';
  sorted.forEach(tag => {
    const opt = document.createElement('option');
    opt.value = tag;
    opt.textContent = tag;
    if (tag === activeTagFilter) opt.selected = true;
    sel.appendChild(opt);
  });

  bar.innerHTML = html;
}

function setTagFilter(tag) {
  activeTagFilter = activeTagFilter === tag ? '' : tag;
  document.getElementById('tag-filter-select').value = activeTagFilter;
  render();
}

function clearTagFilter() {
  activeTagFilter = '';
  document.getElementById('tag-filter-select').value = '';
  render();
}

// 脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙 RENDER 脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙
function render() {
  // sync tag filter select 脙垄脗聠脗聮 activeTagFilter
  const selVal = document.getElementById('tag-filter-select').value;
  if (selVal !== activeTagFilter && selVal !== undefined) {
    activeTagFilter = selVal;
  }

  buildTagFilterBar();
  const filtered = getFiltered();
  const grid = document.getElementById('card-grid');

  document.getElementById('count-badge').textContent = `${filtered.length} item${filtered.length !== 1 ? 's' : ''}`;

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><h3>Nothing here yet</h3><p>Add some links, ideas, or files to your vault.</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(item => renderCard(item)).join('');
  initDragDrop();
}

function renderCard(item) {
  const domain = getDomain(item.url);
  const favicon = item.url ? `<img class="card-favicon" src="${getFaviconUrl(item.url)}" onerror="this.style.display='none'" alt="">` : '';
  const titleContent = item.url
    ? `<a href="${escHtml(item.url)}" target="_blank" rel="noopener">${escHtml(item.title)}</a>`
    : escHtml(item.title);
  const domainEl = domain ? `<div class="card-domain">${escHtml(domain)}</div>` : '';
  const noteEl = item.note ? `<div class="card-note">${escHtml(item.note)}</div>` : '';

  const tagsHtml = (item.tags||[]).map(tag =>
    `<span class="tag">${escHtml(tag)}<button class="tag-remove" onclick="removeTag('${escHtml(item.id)}','${escHtml(tag)}')" title="Remove tag">脙聝脗聴</button></span>`
  ).join('');

  const dateDisplay = item.dateOfPost
    ? `Post: ${formatDate(item.dateOfPost)}`
    : (item.dateAdded ? `Added: ${formatDate(item.dateAdded)}` : '');

  return `
<div class="card" data-id="${escHtml(item.id)}" draggable="true">
  <div class="card-header">
    <span class="drag-handle" title="Drag to reorder">脙垄脗聽脗驴</span>
    ${favicon}
    <div class="card-title-wrap">
      <div class="card-title">${titleContent}</div>
      ${domainEl}
    </div>
    <div class="card-actions">
      <button class="icon-btn" onclick="openModal('${escHtml(item.id)}')" title="Edit">脙垄脗聹脗聨</button>
    </div>
  </div>
  ${noteEl}
  <div class="card-tags">
    ${tagsHtml}
    <button class="tag-add-btn" onclick="openQuickTag('${escHtml(item.id)}')" title="Add tag">+ tag</button>
  </div>
  <div class="card-meta">
    <span>${escHtml(dateDisplay)}</span>
    <span class="card-type-badge">${escHtml(item.type||'link')}</span>
  </div>

function openQuickTag(itemId) {
  const card = document.querySelector(`[data-id="${itemId}"]`);
  if (!card) return;
  const tagsEl = card.querySelector('.card-tags');
  const existing = tagsEl.querySelector('.quick-tag-input-wrap');
  if (existing) { existing.remove(); return; }

  const wrap = document.createElement('div');
  wrap.className = 'quick-tag-input-wrap';
  wrap.innerHTML = `<input class="quick-tag-input" type="text" placeholder="tag name脙垄脗聙脗娄" maxlength="40">`;

  // Insert before the add button
  const addBtn = tagsEl.querySelector('.tag-add-btn');
  tagsEl.insertBefore(wrap, addBtn);

  const input = wrap.querySelector('input');
  input.focus();

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const tag = input.value.trim().replace(/^#/, '');
      if (tag) {
        const item = items.find(i => i.id === itemId);
        if (item) {
          if (!item.tags) item.tags = [];
          if (!item.tags.includes(tag)) item.tags.push(tag);
        }
      }
      render();
    } else if (e.key === 'Escape') {
      render();
    }
  });

  input.addEventListener('blur', () => setTimeout(() => {
    if (document.querySelector(`[data-id="${itemId}"] .quick-tag-input-wrap`)) render();
  }, 200));
}

function initDragDrop() {
  const grid = document.getElementById('card-grid');

  grid.addEventListener('dragstart', (e) => {
    const card = e.target.closest('[data-id]');
    if (!card) return;
    dragSrcId = card.dataset.id;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => card.classList.add('dragging'), 0);
  });

  grid.addEventListener('dragend', () => {
    dragSrcId = null;
    document.querySelectorAll('.card').forEach(c => c.classList.remove('dragging', 'drag-over'));
  });

  grid.addEventListener('dragover', (e) => {
    e.preventDefault();
    const card = e.target.closest('[data-id]');
    if (!card || !dragSrcId || card.dataset.id === dragSrcId) return;
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
    card.classList.add('drag-over');
  });

  grid.addEventListener('dragleave', (e) => {
    const card = e.target.closest('[data-id]');
    if (card) card.classList.remove('drag-over');
  });

  grid.addEventListener('drop', (e) => {
    e.preventDefault();
    const card = e.target.closest('[data-id]');
    if (!card || !dragSrcId || card.dataset.id === dragSrcId) return;
    const targetId = card.dataset.id;

    if (!customOrder) customOrder = items.map(i => i.id);

    const si = customOrder.indexOf(dragSrcId);
    if (si !== -1) customOrder.splice(si, 1);
    const ti = customOrder.indexOf(targetId);
    customOrder.splice(ti, 0, dragSrcId);

    document.getElementById('sort-select').value = 'custom';
    render();
  });
}

function openModal(id) {
  editingId = id || null;
  modalTags = [];
  const overlay = document.getElementById('modal-overlay');
  const deleteBtn = document.getElementById('modal-delete-btn');

  if (id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    document.getElementById('modal-title').textContent = 'Edit Item';
    document.getElementById('modal-url').value = item.url || '';
    document.getElementById('modal-title-input').value = item.title || '';
    document.getElementById('modal-note').value = item.note || '';
    document.getElementById('modal-type').value = item.type || 'link';
    document.getElementById('modal-date-post').value = item.dateOfPost || '';
    modalTags = [...(item.tags||[])];
    deleteBtn.style.display = 'block';
  } else {
    document.getElementById('modal-title').textContent = 'Add to Vault';
    document.getElementById('modal-url').value = '';
    document.getElementById('modal-title-input').value = '';
    document.getElementById('modal-note').value = '';
    document.getElementById('modal-type').value = 'link';
    document.getElementById('modal-date-post').value = '';
    deleteBtn.style.display = 'none';
  }

  renderModalTags();
  overlay.classList.remove('hidden');
  setTimeout(() => document.getElementById('modal-url').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  editingId = null;
  modalTags = [];
}

function renderModalTags() {
  const wrap = document.getElementById('tags-input-wrap');
  const input = document.getElementById('tags-inline-input');
  // Remove all existing tag chips
  wrap.querySelectorAll('.tags-input-tag').forEach(el => el.remove());
  // Re-insert before input
  modalTags.forEach(tag => {
    const chip = document.createElement('span');
    chip.className = 'tags-input-tag';
    chip.innerHTML = `${escHtml(tag)}<button onclick="removeModalTag('${escHtml(tag)}')" type="button">脙聝脗聴</button>`;
    wrap.insertBefore(chip, input);
  });
}

function removeModalTag(tag) {
  modalTags = modalTags.filter(t => t !== tag);
  renderModalTags();
}

document.getElementById('tags-inline-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(/,$/, '').replace(/^#/, '');
    if (val && !modalTags.includes(val)) {
      modalTags.push(val);
      renderModalTags();
    }
    e.target.value = '';
  } else if (e.key === 'Backspace' && !e.target.value && modalTags.length) {
    modalTags.pop();
    renderModalTags();
  }
});

function saveItem() {
  // Capture any pending tag input
  const tagInput = document.getElementById('tags-inline-input');
  const pendingTag = tagInput.value.trim().replace(/^#/, '');
  if (pendingTag && !modalTags.includes(pendingTag)) modalTags.push(pendingTag);
  tagInput.value = '';

  const url = document.getElementById('modal-url').value.trim();
  let title = document.getElementById('modal-title-input').value.trim();
  if (!title && url) { try { title = new URL(url).hostname; } catch { title = url; } }
  if (!title) { title = 'Untitled'; }

  const note = document.getElementById('modal-note').value.trim();
  const type = document.getElementById('modal-type').value;
  const dateOfPost = document.getElementById('modal-date-post').value;

  if (editingId) {
    const item = items.find(i => i.id === editingId);
    if (item) {
      item.url = url;
      item.title = title;
      item.note = note;
      item.type = type;
      item.dateOfPost = dateOfPost;
      item.tags = [...modalTags];
    }
  } else {
    const today = new Date().toISOString().split('T')[0];
    items.unshift({ id: generateId(), url, title, note, type, dateAdded: today, dateOfPost, tags: [...modalTags] });
  }

  closeModal();
  render();
}

function deleteItem() {
  if (!editingId) return;
  if (!confirm('Delete this item?')) return;
  items = items.filter(i => i.id !== editingId);
  if (customOrder) customOrder = customOrder.filter(id => id !== editingId);
  closeModal();
  render();
}

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
});
