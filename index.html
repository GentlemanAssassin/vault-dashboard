<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault</title>
<style>
:root {
  --bg:        #0b0b0f;
  --surface:   #131318;
  --surface2:  #18181f;
  --surface3:  #1e1e27;
  --border:    #22222e;
  --border2:   #2a2a38;
  --text:      #e4e4f0;
  --text-dim:  #666688;
  --text-muted:#3a3a4e;
  --radius:    10px;
  --transition:0.14s ease;

  /* Domain colors */
  --c-ai:       #9b6dff;
  --c-finance:  #22d3a0;
  --c-design:   #fbbf24;
  --c-business: #60a5fa;
  --c-tech:     #22d3ee;
  --c-world:    #f87171;

  /* Lens colors */
  --c-tool:     #fb923c;
  --c-read:     #818cf8;
  --c-idea:     #fcd34d;
  --c-follow:   #c084fc;
  --c-research: #34d399;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;line-height:1.5;}

/* ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ HEADER ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ */
header{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:14px 24px;border-bottom:1px solid var(--border);
  background:rgba(11,11,15,0.92);backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:200;
}
.logo{font-size:17px;font-weight:800;letter-spacing:-0.5px;flex-shrink:0;color:var(--text);}
.logo em{color:var(--c-ai);font-style:normal;}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-left:auto;}
.search-wrap{position:relative;}
.search-wrap input{
  background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
  color:var(--text);font-size:13px;padding:6px 10px 6px 30px;width:190px;
  outline:none;transition:border-color var(--transition),width var(--transition);
}
.search-wrap input:focus{border-color:var(--c-ai);width:230px;}
.search-wrap::before{content:'ÃÂ¢ÃÂÃÂ';position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:14px;pointer-events:none;}
.hdr-select{
  background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
  color:var(--text);font-size:12px;padding:6px 10px;outline:none;cursor:pointer;
}
.view-toggle{display:flex;border:1px solid var(--border2);border-radius:8px;overflow:hidden;}
.vbtn{background:none;border:none;padding:6px 9px;color:var(--text-dim);cursor:pointer;font-size:13px;transition:all var(--transition);}
.vbtn.active{background:rgba(155,109,255,0.15);color:var(--c-ai);}
.add-btn{
  background:var(--c-ai);border:none;border-radius:8px;color:#fff;
  cursor:pointer;font-size:12px;font-weight:700;padding:6px 14px;
  transition:opacity var(--transition);flex-shrink:0;letter-spacing:0.3px;
}
.add-btn:hover{opacity:0.82;}
.count{font-size:11px;color:var(--text-dim);white-space:nowrap;}

/* ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ MAIN ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ */
main{padding:20px 24px;max-width:1700px;margin:0 auto;}

/* ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ FILTER BARS ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ */
.filter-section{margin-bottom:18px;display:flex;flex-direction:column;gap:8px;}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.filter-label{font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-muted);width:52px;flex-shrink:0;}

.fbtn{
  background:var(--surface2);border:1px solid var(--border2);border-radius:20px;
  color:var(--text-dim);cursor:pointer;font-size:11px;font-weight:500;
  padding:4px 11px;transition:all var(--transition);display:flex;align-items:center;gap:4px;
}
.fbtn:hover{border-color:var(--border2);color:var(--text);background:var(--surface3);}
.fbtn.active-domain{color:#fff;}
.fbtn[data-domain="AI"].active-domain{background:rgba(155,109,255,0.2);border-color:var(--c-ai);color:var(--c-ai);}
.fbtn[data-domain="Finance"].active-domain{background:rgba(34,211,160,0.15);border-color:var(--c-finance);color:var(--c-finance);}
.fbtn[data-domain="Design"].active-domain{background:rgba(251,191,36,0.15);border-color:var(--c-design);color:var(--c-design);}
.fbtn[data-domain="Business"].active-domain{background:rgba(96,165,250,0.15);border-color:var(--c-business);color:var(--c-business);}
.fbtn[data-domain="Tech"].active-domain{background:rgba(34,211,238,0.15);border-color:var(--c-tech);color:var(--c-tech);}
.fbtn[data-domain="World"].active-domain{background:rgba(248,113,113,0.15);border-color:var(--c-world);color:var(--c-world);}

.fbtn[data-lens="tool"].active-lens{background:rgba(251,146,60,0.15);border-color:var(--c-tool);color:var(--c-tool);}
.fbtn[data-lens="read"].active-lens{background:rgba(129,140,248,0.15);border-color:var(--c-read);color:var(--c-read);}
.fbtn[data-lens="idea"].active-lens{background:rgba(252,211,77,0.15);border-color:var(--c-idea);color:var(--c-idea);}
.fbtn[data-lens="follow"].active-lens{background:rgba(192,132,252,0.15);border-color:var(--c-follow);color:var(--c-follow);}
.fbtn[data-lens="research"].active-lens{background:rgba(52,211,153,0.15);border-color:var(--c-research);color:var(--c-research);}

.clear-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:11px;padding:4px 8px;border-radius:6px;transition:color var(--transition);}
.clear-btn:hover{color:var(--text-dim);}

/* ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ GRID ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ */
#card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;}

/* ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ CARD ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-left:3px solid var(--domain-color,var(--border));
  border-radius:var(--radius);
  padding:14px 15px;
  display:flex;flex-direction:column;gap:10px;
  transition:border-color var(--transition),box-shadow var(--transition),transform var(--transition);
  position:relative;cursor:default;
}
.card:hover{border-color:var(--border2);box-shadow:0 6px 24px rgba(0,0,0,0.35);}
.card.dragging{opacity:0.25;transform:scale(0.97);}
.card.drag-over{box-shadow:0 0 0 2px var(--domain-color,var(--c-ai)) !important;}

/* Domain color map */
.card[data-domain="AI"]      { --domain-color: var(--c-ai); }
.card[data-domain="Finance"] { --domain-color: var(--c-finance); }
.card[data-domain="Design"]  { --domain-color: var(--c-design); }
.card[data-domain="Business"]{ --domain-color: var(--c-business); }
.card[data-domain="Tech"]    { --domain-color: var(--c-tech); }
.card[data-domain="World"]   { --domain-color: var(--c-world); }

/* NEW badge */
.new-badge{
  position:absolute;top:10px;right:10px;
  background:rgba(155,109,255,0.25);color:var(--c-ai);
  font-size:9px;font-weight:800;letter-spacing:0.8px;text-transform:uppercase;
  padding:2px 7px;border-radius:10px;border:1px solid rgba(155,109,255,0.4);
}

/* Card top row */
.card-top{display:flex;align-items:flex-start;gap:8px;}
.drag-handle{cursor:grab;color:var(--text-muted);opacity:0;transition:opacity var(--transition);padding:2px 2px;font-size:14px;user-select:none;flex-shrink:0;margin-top:2px;}
.card:hover .drag-handle{opacity:0.5;}
.drag-handle:active{cursor:grabbing;}
.card-favicon{width:18px;height:18px;border-radius:4px;flex-shrink:0;object-fit:contain;margin-top:2px;}
.card-title-block{flex:1;min-width:0;}
.card-title{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;word-break:break-word;}
.card-title a{color:inherit;text-decoration:none;transition:color var(--transition);}
.card-title a:hover{color:var(--domain-color);}

/* Badges row */
.card-badges{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap;}
.domain-badge{
  font-size:10px;font-weight:700;letter-spacing:0.4px;
  padding:2px 8px;border-radius:10px;white-space:nowrap;
  background:color-mix(in srgb, var(--domain-color) 18%, transparent);
  color:var(--domain-color);
  border:1px solid color-mix(in srgb, var(--domain-color) 30%, transparent);
}
.lens-badge{
  font-size:10px;font-weight:500;padding:2px 7px;border-radius:10px;
  background:var(--surface3);color:var(--text-dim);
  border:1px solid var(--border2);white-space:nowrap;
}
.card-actions{flex-shrink:0;opacity:0;transition:opacity var(--transition);}
.card:hover .card-actions{opacity:1;}
.icon-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:13px;padding:3px;border-radius:5px;transition:color var(--transition),background var(--transition);}
.icon-btn:hover{color:var(--text);background:var(--surface3);}

/* Note */
.card-note{font-size:12px;color:var(--text-dim);line-height:1.5;word-break:break-word;}

/* Tags */
.card-tags{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-top:2px;}
.tag{
  background:var(--surface3);border:1px solid var(--border2);border-radius:6px;
  color:var(--text-muted);font-size:10px;padding:2px 7px;display:inline-flex;
  align-items:center;gap:3px;transition:all var(--transition);
}
.tag:hover{color:var(--text-dim);}
.tag-remove{background:none;border:none;color:inherit;cursor:pointer;font-size:11px;line-height:1;padding:0;opacity:0.6;}
.tag-remove:hover{opacity:1;}
.tag-add-btn{
  background:none;border:1px dashed var(--border2);border-radius:6px;
  color:var(--text-muted);cursor:pointer;font-size:10px;padding:2px 8px;
  transition:all var(--transition);
}
.tag-add-btn:hover{border-color:var(--c-ai);color:var(--c-ai);}
.quick-tag-input-wrap input{
  background:var(--surface3);border:1px solid var(--c-ai);border-radius:6px;
  color:var(--text);font-size:11px;padding:2px 8px;outline:none;width:100px;
}

/* Card footer */
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:2px;}
.card-date{font-size:10px;color:var(--text-muted);}
.card-url{font-size:10px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px;}

/* ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ LIST VIEW ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ */
#card-grid.list-view{grid-template-columns:1fr;}
#card-grid.list-view .card{flex-direction:row;align-items:flex-start;gap:14px;padding:12px 16px;}
#card-grid.list-view .card-top{flex:0 0 260px;}
#card-grid.list-view .card-note{flex:1;margin:0;}
#card-grid.list-view .card-tags{flex:0 0 auto;flex-direction:column;align-items:flex-start;gap:3px;min-width:120px;}
#card-grid.list-view .card-footer{flex:0 0 80px;flex-direction:column;align-items:flex-end;}

/* ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ EMPTY STATE ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ */
.empty{padding:60px;text-align:center;color:var(--text-dim);}
.empty h3{font-size:18px;font-weight:600;margin-bottom:8px;color:var(--text);}
.empty p{font-size:13px;}

/* ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ MODAL ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.hidden{display:none;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal h2{font-size:16px;font-weight:700;margin-bottom:18px;color:var(--text);}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:5px;}
.form-group input,.form-group textarea,.form-group select{
  width:100%;background:var(--surface2);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);font-size:13px;padding:8px 11px;
  outline:none;transition:border-color var(--transition);
}
.form-group textarea{resize:vertical;min-height:70px;line-height:1.5;}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--c-ai);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.tags-input-wrap{
  display:flex;flex-wrap:wrap;gap:5px;align-items:center;
  background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
  padding:6px 8px;min-height:38px;cursor:text;transition:border-color var(--transition);
}
.tags-input-wrap:focus-within{border-color:var(--c-ai);}
.tags-input-tag{
  background:var(--surface3);border:1px solid var(--border2);border-radius:5px;
  color:var(--text-dim);font-size:11px;padding:2px 6px;display:inline-flex;align-items:center;gap:4px;
}
.tags-input-tag button{background:none;border:none;color:inherit;cursor:pointer;font-size:12px;padding:0;line-height:1;}
#tags-inline-input{background:none;border:none;color:var(--text);font-size:12px;outline:none;min-width:80px;flex:1;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
.btn{border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;padding:8px 16px;transition:opacity var(--transition);}
.btn-primary{background:var(--c-ai);color:#fff;}
.btn-primary:hover{opacity:0.85;}
.btn-secondary{background:var(--surface3);color:var(--text-dim);}
.btn-secondary:hover{color:var(--text);}
.btn-danger{background:rgba(248,113,113,0.15);color:#f87171;border:1px solid rgba(248,113,113,0.3);}
.btn-danger:hover{opacity:0.85;}
</style>
</head>
<body>

<header>
  <div class="logo">ÃÂ¢ÃÂ¬ÃÂ¡ <em>Vault</em></div>
  <div class="header-right">
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="SearchÃÂ¢ÃÂÃÂ¦" oninput="render()">
    </div>
    <select class="hdr-select" id="sort-select" onchange="render()">
      <option value="dateAdded-desc">Newest first</option>
      <option value="dateAdded-asc">Oldest first</option>

      <button class="fbtn" data-domain="Design" onclick="setDomain('Design')">ÃÂ°ÃÂÃÂÃÂ¨ Design</button>
      <button class="fbtn" data-domain="Business" onclick="setDomain('Business')">ÃÂ°ÃÂÃÂÃÂ¢ Business</button>
      <button class="fbtn" data-domain="Tech" onclick="setDomain('Tech')">ÃÂ¢ÃÂÃÂÃÂ¯ÃÂ¸ÃÂ Tech</button>

      <button class="fbtn" data-lens="" onclick="setLens('')">All</button>
      <button class="fbtn" data-lens="tool" onclick="setLens('tool')">ÃÂ°ÃÂÃÂÃÂ  Try It</button>
      <button class="fbtn" data-lens="read" onclick="setLens('read')">ÃÂ°ÃÂÃÂÃÂ Read</button>
      <button class="fbtn" data-lens="follow" onclick="setLens('follow')">ÃÂ°ÃÂÃÂÃÂ¤ Follow</button>
      <button class="fbtn" data-lens="research" onclick="setLens('research')">ÃÂ°ÃÂÃÂÃÂ¬ Research</button>
      <button class="fbtn" data-lens="idea" onclick="setLens('idea')">ÃÂ°ÃÂÃÂÃÂ¡ Idea</button>
    </div>
    <div class="filter-row" id="tag-filter-row" style="display:none;">
      <span class="filter-label">Tag</span>
      <div id="tag-filter-chips" style="display:flex;flex-wrap:wrap;gap:6px;"></div>

  </div>

  <div id="card-grid"></div>
</main>

<!-- Modal -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">

    <div class="form-group">

      <div class="form-group">

        <select id="modal-domain">
          <option value="AI">ÃÂ°ÃÂÃÂ¤ÃÂ AI</option>
          <option value="Finance">ÃÂ°ÃÂÃÂÃÂ° Finance</option>
          <option value="Design">ÃÂ°ÃÂÃÂÃÂ¨ Design</option>
          <option value="Business">ÃÂ°ÃÂÃÂÃÂ¢ Business</option>
          <option value="Tech">ÃÂ¢ÃÂÃÂÃÂ¯ÃÂ¸ÃÂ Tech</option>
          <option value="World">ÃÂ°ÃÂÃÂÃÂ World</option>
        </select>
      </div>
      <div class="form-groub>
        <label>Lens</label>
        <select id="modal-lens">
          <option value="tool">ÃÂ°ÃÂÃÂÃÂ  Try It</option>
          <option value="read">ÃÂ°ÃÂÃÂÃÂ Read</option>
          <option value="follow">ÃÂ°ÃÂÃÂÃÂ¤ Follow</option>
          <option value="research">ÃÂ°ÃÂÃÂÃÂ¬ Research</option>

    <div class="form-row">

      <div class="tags-input-wrap" id="tags-input-wrap" onclick="document.getElementById('tags-inline-input').focus()">
        <input type="text" id="tags-inline-input" placeholder="add tagÃÂ¢ÃÂÃÂ¦" autocomplete="off">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="modal-delete-btn" onclick="deleteItem()" style="display:none;margin-right:auto;">Delete</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveItem()">Save</button>

  </div>

function getFiltered() {
  const q    = document.getElementById('search-input').value.trim().toLowerCase();
  const sort = document.getElementById('sort-select').value;

  let filtered = items.filter(item => {
    const matchSearch = !q || [item.title, item.url, item.note, item.domain, item.lens, ...(item.tags||[])].some(v => v && v.toLowerCase().includes(q));
    const matchDomain = !activeDomain || item.domain === activeDomain;
    const matchLens   = !activeLens   || item.lens   === activeLens;
    const matchTag    = !activeTag    || (item.tags||[]).includes(activeTag);
    return matchSearch && matchDomain && matchLens && matchTag;
  });

  if (sort === 'custom' && customOrder) {
    filtered.sort((a,b) => {
      const ai = customOrder.indexOf(a.id), bi = customOrder.indexOf(b.id);
      if (ai===-1) return 1; if (bi===-1) return -1; return ai-bi;
    });
  } else if (sort === 'dateAdded-desc') filtered.sort((a,b)=>(b.dateAdded||'').localeCompare(a.dateAdded||''));
  else if (sort === 'dateAdded-asc')    filtered.sort((a,b)=>(a.dateAdded||'').localeCompare(b.dateAdded||''));
  else if (sort === 'dateOfPost-desc')  filtered.sort((a,b)=>(b.dateOfPost||'').localeCompare(a.dateOfPost||''));
  else if (sort === 'title-asc')        filtered.sort((a,b)=>a.title.localeCompare(b.title));
  return filtered;
}

function buildTagBar(filtered) {
  const counts = {};
  filtered.forEach(item => (item.tags||[]).forEach(t => { counts[t] = (counts[t]||0)+1; }));
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(e=>e[0]).slice(0,18);
  const row = document.getElementById('tag-filter-row');
  const chips = document.getElementById('tag-filter-chips');
  if (!sorted.length) { row.style.display='none'; return; }
  row.style.display='flex';
  let html = '';
  if (activeTag) html += `<button class="clear-btn" onclick="setTag('')">ÃÂ¢ÃÂÃÂ Clear</button>`;
  sorted.forEach(tag => {
    const active = activeTag === tag;
    html += `<button class="fbtn${active?' active-domain':''}" style="${active?'background:rgba(155,109,255,0.15);border-color:var(--c-ai);color:var(--c-ai);':''}" onclick="setTag('${escHtml(tag)}')">${escHtml(tag)}</button>`;
  });
  chips.innerHTML = html;
}

    ? `Post ${formatDate(item.dateOfPost)}`
    : (item.dateAdded ? `Added ${formatDate(item.dateAdded)}` : '');

  return `

    <span class="card-date">${escHtml(dateLabel)}</span>
    <span class="card-url">${escHtml(urlLabel)}</span>

</div>`;
}

// ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ QUICK TAG ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ
function openQuickTag(itemId) {
  const card = document.querySelector(`[data-id="${itemId}"]`);
  if (!card) return;
  const tagsEl = card.querySelector('.card-tags');
  const existing = tagsEl.querySelector('.quick-tag-input-wrap');
  if (existing) { existing.remove(); return; }
  const wrap = document.createElement('div');
  wrap.className = 'quick-tag-input-wrap';
  wrap.innerHTML = `<input type="text" placeholder="tag nameÃÂ¢ÃÂÃÂ¦" maxlength="40">`;
  tagsEl.insertBefore(wrap, tagsEl.querySelector('.tag-add-btn'));
  const input = wrap.querySelector('input');
  input.focus();
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const tag = input.value.trim().replace(/^#/, '');
      if (tag) {
        const item = items.find(i => i.id === itemId);
        if (item) {
          if (!item.tags) item.tags = [];
          if (!item.tags.includes(tag)) item.tags.push(tag);
        }
      }
      render();
    } else if (e.key === 'Escape') { render(); }
  });
  input.addEventListener('blur', () => setTimeout(() => {
    if (document.querySelector(`[data-id="${itemId}"] .quick-tag-input-wrap`)) render();
  }, 200));
}

function removeTag(itemId, tag) {
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  item.tags = (item.tags||[]).filter(t => t !== tag);
  render();
}

// ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ DRAG & DROP ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ
function initDragDrop() {
  const grid = document.getElementById('card-grid');
  grid.addEventListener('dragstart', e => {
    const card = e.target.closest('[data-id]');
    if (!card) return;
    dragSrcId = card.dataset.id;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => card.classList.add('dragging'), 0);
  });
  grid.addEventListener('dragend', () => {
    dragSrcId = null;
    document.querySelectorAll('.card').forEach(c => c.classList.remove('dragging','drag-over'));
  });
  grid.addEventListener('dragover', e => {
    e.preventDefault();
    const card = e.target.closest('[data-id]');
    if (!card || !dragSrcId || card.dataset.id === dragSrcId) return;
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
    card.classList.add('drag-over');
  });
  grid.addEventListener('dragleave', e => {
    const card = e.target.closest('[data-id]');
    if (card) card.classList.remove('drag-over');
  });
  grid.addEventListener('drop', e => {
    e.preventDefault();
    const card = e.target.closest('[data-id]');
    if (!card || !dragSrcId || card.dataset.id === dragSrcId) return;
    if (!customOrder) customOrder = items.map(i => i.id);
    const si = customOrder.indexOf(dragSrcId);
    if (si !== -1) customOrder.splice(si, 1);
    const ti = customOrder.indexOf(card.dataset.id);
    customOrder.splice(ti, 0, dragSrcId);
    document.getElementById('sort-select').value = 'custom';
    render();
  });
}

// ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ MODAL ÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂÃÂ¢ÃÂÃÂ
function openModal(id) {
  editingId = id || null;
  modalTags = [];
  const overlay = document.getElementById('modal-overlay');
  const deleteBtn = document.getElementById('modal-delete-btn');
  if (id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    document.getElementById('modal-title').textContent = 'Edit Item';
    document.getElementById('modal-url').value         = item.url || '';
    document.getElementById('modal-title-input').value = item.title || '';
    document.getElementById('modal-note').value        = item.note || '';
    document.getElementById('modal-domain').value      = item.domain || 'AI';
    document.getElementById('modal-lens').value        = item.lens || 'read';
    document.getElementById('modal-type').value        = item.type || 'link';
    document.getElementById('modal-date-post').value   = item.dateOfPost || '';
    modalTags = [...(item.tags||[])];
    deleteBtn.style.display = 'block';
  } else {
    document.getElementById('modal-title').textContent = 'Add to Vault';
    document.getElementById('modal-url').value = '';
    document.getElementById('modal-title-input').value = '';
    document.getElementById('modal-note').value = '';
    document.getElementById('modal-domain').value = 'AI';
    document.getElementById('modal-lens').value = 'read';
    document.getElementById('modal-type').value = 'link';
    document.getElementById('modal-date-post').value = '';
    deleteBtn.style.display = 'none';
  }
  renderModalTags();
  overlay.classList.remove('hidden');
  setTimeout(() => document.getElementById('modal-url').focus(), 50);
}
function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  editingId = null; modalTags = [];
}
function renderModalTags() {
  const wrap = document.getElementById('tags-input-wrap');
  const input = document.getElementById('tags-inline-input');
  wrap.querySelectorAll('.tags-input-tag').forEach(el => el.remove());
  modalTags.forEach(tag => {
    const chip = document.createElement('span');
    chip.className = 'tags-input-tag';
    chip.innerHTML = `${escHtml(tag)}<button onclick="removeModalTag('${escHtml(tag)}')" type="button">ÃÂÃÂ</button>`;
    wrap.insertBefore(chip, input);
  });
}
function removeModalTag(tag) {
  modalTags = modalTags.filter(t => t !== tag);
  renderModalTags();
}
document.getElementById('tags-inline-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(/,$/, '').replace(/^#/, '');
    if (val && !modalTags.includes(val)) { modalTags.push(val); renderModalTags(); }
    e.target.value = '';
  } else if (e.key === 'Backspace' && !e.target.value && modalTags.length) {
    modalTags.pop(); renderModalTags();
  }
});
function saveItem() {
  const tagInput = document.getElementById('tags-inline-input');
  const pending = tagInput.value.trim().replace(/^#/, '');
  if (pending && !modalTags.includes(pending)) modalTags.push(pending);
  tagInput.value = '';
  const url    = document.getElementById('modal-url').value.trim();
  let title    = document.getElementById('modal-title-input').value.trim();
  if (!title && url) { try { title = new URL(url).hostname; } catch { title = url; } }
  if (!title) title = 'Untitled';
  const note       = document.getElementById('modal-note').value.trim();
  const domain     = document.getElementById('modal-domain').value;
  const lens       = document.getElementById('modal-lens').value;
  const type       = document.getElementById('modal-type').value;
  const dateOfPost = document.getElementById('modal-date-post').value;
  if (editingId) {
    const item = items.find(i => i.id === editingId);
    if (item) { Object.assign(item, { url, title, note, domain, lens, type, dateOfPost, tags: [...modalTags] }); }
  } else {
    const today = new Date().toISOString().split('T')[0];
    items.unshift({ id: genId(), url, title, note, domain, lens, type, dateAdded: today, dateOfPost, tags: [...modalTags] });
  }
  closeModal();
  render();
}
function deleteItem() {
  if (!editingId) return;
  if (!confirm('Delete this item?')) return;
  items = items.filter(i => i.id !== editingId);
  if (customOrder) customOrder = customOrder.filter(id => id !== editingId);
  closeModal(); render();
}

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey||e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('search-input').focus(); }
});
