<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --accent: #6366f1;
    --accent-glow: rgba(99,102,241,0.15);
    --tag-article: #3b82f6;
    --tag-video: #ef4444;
    --tag-tool: #10b981;
    --tag-idea: #f59e0b;
    --tag-reference: #8b5cf6;
    --tag-read-later: #ec4899;
    --tag-research: #06b6d4;
    --tag-default: #6b7280;
    --radius: 12px;
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--accent);
    flex-shrink: 0;
  }

  .logo span { color: var(--text-dim); font-weight: 400; font-size: 14px; margin-left: 8px; }

  .search-box {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 10px 16px 10px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color var(--transition);
  }

  .search-box input:focus { border-color: var(--accent); }

  .search-box svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    width: 18px;
    height: 18px;
  }

  .view-toggle {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border-radius: 8px;
    padding: 3px;
    border: 1px solid var(--border);
  }

  .view-btn {
    padding: 6px 12px;
    border: none;
    background: none;
    color: var(--text-dim);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all var(--transition);
  }

  .view-btn.active { background: var(--accent); color: white; }

  .stats {
    font-size: 13px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  /* Filters */
  .filters {
    max-width: 1200px;
    margin: 16px auto;
    padding: 0 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    transition: all var(--transition);
    user-select: none;
  }

  .filter-chip:hover { border-color: var(--accent); color: var(--text); }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: white; }

  .filter-chip .count {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 6px;
    border-radius: 10px;
    background: rgba(255,255,255,0.15);
    font-size: 11px;
  }

  .filter-divider {
    width: 1px;
    height: 24px;
    background: var(--border);
    margin: 0 4px;
  }

  /* Main Grid */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 8px 24px 40px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  .list .grid {
    grid-template-columns: 1fr;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: all var(--transition);
    position: relative;
    overflow: hidden;
    cursor: default;
  }

  .card:hover {
    border-color: rgba(99,102,241,0.4);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3), 0 0 0 1px rgba(99,102,241,0.1);
  }

  .card-type-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
    gap: 12px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
    flex: 1;
  }

  .card-title a {
    color: inherit;
    text-decoration: none;
  }

  .card-title a:hover { color: var(--accent); }

  .card-menu-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity var(--transition);
    flex-shrink: 0;
  }

  .card:hover .card-menu-btn { opacity: 1; }
  .card-menu-btn:hover { background: var(--surface2); color: var(--text); }

  .card-excerpt {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 14px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-url {
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-url a { color: inherit; text-decoration: none; }
  .card-url a:hover { text-decoration: underline; }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 500;
    text-transform: lowercase;
    cursor: pointer;
    transition: all var(--transition);
  }

  .tag:hover { filter: brightness(1.2); }

  .tag .remove-tag {
    display: none;
    margin-left: 2px;
    font-size: 14px;
    line-height: 1;
  }

  .tag:hover .remove-tag { display: inline; }

  .card-date {
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  /* Tag colors */
  .tag-article { background: rgba(59,130,246,0.15); color: var(--tag-article); }
  .tag-video { background: rgba(239,68,68,0.15); color: var(--tag-video); }
  .tag-tool { background: rgba(16,185,129,0.15); color: var(--tag-tool); }
  .tag-idea { background: rgba(245,158,11,0.15); color: var(--tag-idea); }
  .tag-reference { background: rgba(139,92,246,0.15); color: var(--tag-reference); }
  .tag-read-later { background: rgba(236,72,153,0.15); color: var(--tag-read-later); }
  .tag-research { background: rgba(6,182,212,0.15); color: var(--tag-research); }
  .tag-default { background: rgba(107,114,128,0.15); color: var(--tag-default); }

  /* Context Menu / Edit Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    justify-content: center;
    align-items: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 90%;
    max-width: 500px;
    max-height: 80vh;
    overflow-y: auto;
  }

  .modal h3 {
    font-size: 16px;
    margin-bottom: 16px;
    color: var(--text);
  }

  .modal label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
    margin-top: 12px;
  }

  .modal input, .modal textarea, .modal select {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }

  .modal input:focus, .modal textarea:focus, .modal select:focus {
    border-color: var(--accent);
  }

  .modal textarea { resize: vertical; min-height: 60px; }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    justify-content: flex-end;
  }

  .btn {
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: all var(--transition);
  }

  .btn:hover { background: var(--border); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-danger { color: #ef4444; }
  .btn-danger:hover { background: rgba(239,68,68,0.15); }

  .tag-input-container {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    min-height: 40px;
    cursor: text;
  }

  .tag-input-container:focus-within { border-color: var(--accent); }

  .tag-input-container .tag { cursor: default; }

  .tag-input-container input {
    flex: 1;
    min-width: 80px;
    padding: 2px 4px;
    border: none;
    background: none;
  }

  /* Add button */
  .add-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: white;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(99,102,241,0.4);
    transition: all var(--transition);
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .add-btn:hover { transform: scale(1.1); box-shadow: 0 6px 30px rgba(99,102,241,0.5); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
  }

  .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 14px; }

  /* Responsive */
  @media (max-width: 640px) {
    .header-inner { gap: 12px; }
    .grid { grid-template-columns: 1fr; }
    .filters { padding: 0 16px; }
    .main { padding: 8px 16px 80px; }
    .header { padding: 12px 16px; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* Category selector in modal */
  .category-options {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }

  .category-option {
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    transition: all var(--transition);
  }

  .category-option:hover { border-color: var(--accent); color: var(--text); }
  .category-option.selected { background: var(--accent); border-color: var(--accent); color: white; }

  /* Favorite star */
  .star-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    padding: 2px;
    opacity: 0.3;
    transition: all var(--transition);
  }

  .star-btn:hover { opacity: 0.7; }
  .star-btn.starred { opacity: 1; }

  /* Sort dropdown */
  .sort-select {
    padding: 6px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">Vault <span id="item-count"></span></div>
    <div class="search-box">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
      <input type="text" id="search" placeholder="Search titles, notes, URLs, tags..." autocomplete="off">
    </div>
    <select class="sort-select" id="sort-select">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="alpha">A - Z</option>
      <option value="starred">Starred first</option>
    </select>
    <div class="view-toggle">
      <button class="view-btn active" data-view="grid">Grid</button>
      <button class="view-btn" data-view="list">List</button>
    </div>
  </div>
</div>

<div class="filters" id="filters"></div>

<div class="main" id="main-container">
  <div class="grid" id="card-grid"></div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3 id="modal-title">Edit Item</h3>
    <input type="hidden" id="edit-id">

    <label>Title</label>
    <input type="text" id="edit-title">

    <label>URL</label>
    <input type="text" id="edit-url">

    <label>Notes</label>
    <textarea id="edit-notes" rows="3"></textarea>

    <label>Category</label>
    <div class="category-options" id="edit-categories"></div>

    <label>Tags (press Enter to add)</label>
    <div class="tag-input-container" id="tag-input-container">
      <input type="text" id="tag-input" placeholder="Add tag...">
    </div>

    <div class="modal-actions">
      <button class="btn btn-danger" id="delete-btn" onclick="deleteItem()">Delete</button>
      <div style="flex:1"></div>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<!-- Add Manual Item Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h3>Add Item</h3>

    <label>Title</label>
    <input type="text" id="add-title">

    <label>URL (optional)</label>
    <input type="text" id="add-url">

    <label>Notes (optional)</label>
    <textarea id="add-notes" rows="3"></textarea>

    <label>Category</label>
    <div class="category-options" id="add-categories"></div>

    <label>Tags (press Enter to add)</label>
    <div class="tag-input-container" id="add-tag-container">
      <input type="text" id="add-tag-input" placeholder="Add tag...">
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNewItem()">Add</button>
    </div>
  </div>
</div>

<button class="add-btn" onclick="openAddModal()" title="Add item manually">+</button>

<script>
// ============================================================
// DATA STORE - This is where the scheduled task injects items
// ============================================================
const VAULT_DATA = {
  items: [],
  lastUpdated: null
};

// ============================================================
// CATEGORIES
// ============================================================
const CATEGORIES = [
  { id: 'article', label: 'Article', color: 'var(--tag-article)' },
  { id: 'video', label: 'Video', color: 'var(--tag-video)' },
  { id: 'tool', label: 'Tool', color: 'var(--tag-tool)' },
  { id: 'idea', label: 'Idea', color: 'var(--tag-idea)' },
  { id: 'reference', label: 'Reference', color: 'var(--tag-reference)' },
  { id: 'read-later', label: 'Read Later', color: 'var(--tag-read-later)' },
  { id: 'research', label: 'Research', color: 'var(--tag-research)' },
];

// ============================================================
// STATE
// ============================================================
let items = [...VAULT_DATA.items];
let activeCategory = 'all';
let activeTags = [];
let currentView = 'grid';
let editingTags = [];
let addingTags = [];
let addCategory = 'article';

// Load local overrides (edits, manual adds, deletes)
function loadLocalOverrides() {
  // We store overrides in the data itself via the JSON
  // For client-side edits between syncs, use in-memory state
}

// ============================================================
// RENDER
// ============================================================
function getTagClass(tag) {
  const t = tag.toLowerCase().replace(/[^a-z-]/g, '');
  const cat = CATEGORIES.find(c => c.id === t);
  return cat ? `tag-${t}` : 'tag-default';
}

function getTypeBarColor(category) {
  const cat = CATEGORIES.find(c => c.id === category);
  return cat ? cat.color : 'var(--tag-default)';
}

function renderFilters() {
  const container = document.getElementById('filters');
  const catCounts = { all: items.length };
  const tagCounts = {};

  items.forEach(item => {
    catCounts[item.category] = (catCounts[item.category] || 0) + 1;
    (item.tags || []).forEach(t => {
      tagCounts[t] = (tagCounts[t] || 0) + 1;
    });
  });

  let html = `<div class="filter-chip ${activeCategory === 'all' ? 'active' : ''}" onclick="filterCategory('all')">All <span class="count">${catCounts.all}</span></div>`;

  CATEGORIES.forEach(cat => {
    if (catCounts[cat.id]) {
      html += `<div class="filter-chip ${activeCategory === cat.id ? 'active' : ''}" onclick="filterCategory('${cat.id}')">${cat.label} <span class="count">${catCounts[cat.id]}</span></div>`;
    }
  });

  const uniqueTags = Object.keys(tagCounts).sort();
  if (uniqueTags.length > 0) {
    html += `<div class="filter-divider"></div>`;
    uniqueTags.forEach(tag => {
      const isActive = activeTags.includes(tag);
      html += `<div class="filter-chip ${isActive ? 'active' : ''}" onclick="toggleTag('${tag}')">#${tag} <span class="count">${tagCounts[tag]}</span></div>`;
    });
  }

  container.innerHTML = html;
}

function getFiltered() {
  const query = document.getElementById('search').value.toLowerCase().trim();
  let filtered = items.filter(item => {
    if (activeCategory !== 'all' && item.category !== activeCategory) return false;
    if (activeTags.length > 0 && !activeTags.every(t => (item.tags || []).includes(t))) return false;
    if (query) {
      const searchable = [item.title, item.notes, item.url, ...(item.tags || []), item.category].join(' ').toLowerCase();
      return searchable.includes(query);
    }
    return true;
  });

  const sort = document.getElementById('sort-select').value;
  filtered.sort((a, b) => {
    if (sort === 'starred') {
      if (a.starred && !b.starred) return -1;
      if (!a.starred && b.starred) return 1;
    }
    if (sort === 'oldest') return new Date(a.date) - new Date(b.date);
    if (sort === 'alpha') return (a.title || '').localeCompare(b.title || '');
    return new Date(b.date) - new Date(a.date);
  });

  return filtered;
}

function renderCards() {
  const grid = document.getElementById('card-grid');
  const filtered = getFiltered();

  document.getElementById('item-count').textContent = `${filtered.length} item${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1;">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-2.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" /></svg>
        <h3>Nothing here yet</h3>
        <p>Send an email to claude4mtl@gmail.com to save links, videos, and ideas.</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(item => {
    const tags = (item.tags || []).map(t =>
      `<span class="tag ${getTagClass(t)}" onclick="event.stopPropagation(); toggleTag('${t}')">${t}<span class="remove-tag" onclick="event.stopPropagation(); removeTagFromItem('${item.id}', '${t}')">&times;</span></span>`
    ).join('');

    const barColor = getTypeBarColor(item.category);
    const starClass = item.starred ? 'starred' : '';
    const starSymbol = item.starred ? '\u2605' : '\u2606';
    const domain = item.url ? new URL(item.url).hostname.replace('www.', '') : '';
    const urlLine = item.url ? `<div class="card-url"><a href="${item.url}" target="_blank" rel="noopener">${domain}</a></div>` : '';
    const dateStr = item.date ? new Date(item.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';

    return `
      <div class="card" ondblclick="openEdit('${item.id}')">
        <div class="card-type-bar" style="background:${barColor}"></div>
        <div class="card-header">
          <div class="card-title">${item.url ? `<a href="${item.url}" target="_blank" rel="noopener">${escHtml(item.title)}</a>` : escHtml(item.title)}</div>
          <button class="star-btn ${starClass}" onclick="event.stopPropagation(); toggleStar('${item.id}')">${starSymbol}</button>
          <button class="card-menu-btn" onclick="event.stopPropagation(); openEdit('${item.id}')" title="Edit">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
          </button>
        </div>
        ${item.notes ? `<div class="card-excerpt">${escHtml(item.notes)}</div>` : ''}
        ${urlLine}
        <div class="card-footer">
          <div class="card-tags">${tags}</div>
          <div class="card-date">${dateStr}</div>
        </div>
      </div>`;
  }).join('');
}

function render() {
  renderFilters();
  renderCards();
}

// ============================================================
// INTERACTIONS
// ============================================================
function filterCategory(cat) {
  activeCategory = cat;
  render();
}

function toggleTag(tag) {
  const idx = activeTags.indexOf(tag);
  if (idx >= 0) activeTags.splice(idx, 1);
  else activeTags.push(tag);
  render();
}

function toggleStar(id) {
  const item = items.find(i => i.id === id);
  if (item) { item.starred = !item.starred; render(); }
}

function removeTagFromItem(id, tag) {
  const item = items.find(i => i.id === id);
  if (item) {
    item.tags = (item.tags || []).filter(t => t !== tag);
    render();
  }
}

// Edit modal
function openEdit(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;

  document.getElementById('edit-id').value = id;
  document.getElementById('edit-title').value = item.title || '';
  document.getElementById('edit-url').value = item.url || '';
  document.getElementById('edit-notes').value = item.notes || '';
  editingTags = [...(item.tags || [])];

  renderEditCategories(item.category);
  renderEditTags();
  document.getElementById('edit-modal').classList.add('show');
}

function renderEditCategories(selected) {
  const container = document.getElementById('edit-categories');
  container.innerHTML = CATEGORIES.map(c =>
    `<div class="category-option ${c.id === selected ? 'selected' : ''}" onclick="selectEditCategory(this, '${c.id}')">${c.label}</div>`
  ).join('');
}

function selectEditCategory(el, catId) {
  el.parentElement.querySelectorAll('.category-option').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}

function renderEditTags() {
  const container = document.getElementById('tag-input-container');
  const input = document.getElementById('tag-input');
  container.querySelectorAll('.tag').forEach(t => t.remove());
  editingTags.forEach(tag => {
    const span = document.createElement('span');
    span.className = `tag ${getTagClass(tag)}`;
    span.innerHTML = `${tag} <span class="remove-tag" style="display:inline;cursor:pointer" onclick="removeEditTag('${tag}')">&times;</span>`;
    container.insertBefore(span, input);
  });
}

function removeEditTag(tag) {
  editingTags = editingTags.filter(t => t !== tag);
  renderEditTags();
}

document.getElementById('tag-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && this.value.trim()) {
    e.preventDefault();
    const tag = this.value.trim().toLowerCase().replace(/^#/, '');
    if (!editingTags.includes(tag)) { editingTags.push(tag); renderEditTags(); }
    this.value = '';
  }
});

function saveEdit() {
  const id = document.getElementById('edit-id').value;
  const item = items.find(i => i.id === id);
  if (!item) return;

  item.title = document.getElementById('edit-title').value;
  item.url = document.getElementById('edit-url').value;
  item.notes = document.getElementById('edit-notes').value;
  item.tags = [...editingTags];

  const selectedCat = document.querySelector('#edit-categories .category-option.selected');
  if (selectedCat) item.category = selectedCat.textContent.toLowerCase().replace(/\s+/g, '-');

  closeModal();
  render();
}

function deleteItem() {
  const id = document.getElementById('edit-id').value;
  items = items.filter(i => i.id !== id);
  closeModal();
  render();
}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('show');
}

// Add modal
function openAddModal() {
  document.getElementById('add-title').value = '';
  document.getElementById('add-url').value = '';
  document.getElementById('add-notes').value = '';
  addingTags = [];
  addCategory = 'article';
  renderAddCategories();
  renderAddTags();
  document.getElementById('add-modal').classList.add('show');
}

function renderAddCategories() {
  const container = document.getElementById('add-categories');
  container.innerHTML = CATEGORIES.map(c =>
    `<div class="category-option ${c.id === addCategory ? 'selected' : ''}" onclick="selectAddCategory(this, '${c.id}')">${c.label}</div>`
  ).join('');
}

function selectAddCategory(el, catId) {
  addCategory = catId;
  el.parentElement.querySelectorAll('.category-option').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}

function renderAddTags() {
  const container = document.getElementById('add-tag-container');
  const input = document.getElementById('add-tag-input');
  container.querySelectorAll('.tag').forEach(t => t.remove());
  addingTags.forEach(tag => {
    const span = document.createElement('span');
    span.className = `tag ${getTagClass(tag)}`;
    span.innerHTML = `${tag} <span class="remove-tag" style="display:inline;cursor:pointer" onclick="removeAddTag('${tag}')">&times;</span>`;
    container.insertBefore(span, input);
  });
}

function removeAddTag(tag) {
  addingTags = addingTags.filter(t => t !== tag);
  renderAddTags();
}

document.getElementById('add-tag-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && this.value.trim()) {
    e.preventDefault();
    const tag = this.value.trim().toLowerCase().replace(/^#/, '');
    if (!addingTags.includes(tag)) { addingTags.push(tag); renderAddTags(); }
    this.value = '';
  }
});

function saveNewItem() {
  const title = document.getElementById('add-title').value.trim();
  if (!title) return;

  items.unshift({
    id: 'manual-' + Date.now(),
    title,
    url: document.getElementById('add-url').value.trim() || null,
    notes: document.getElementById('add-notes').value.trim() || null,
    category: addCategory,
    tags: [...addingTags],
    date: new Date().toISOString(),
    starred: false,
    source: 'manual'
  });

  closeAddModal();
  render();
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('show');
}

// Close modals on overlay click
document.getElementById('edit-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('add-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeAddModal(); });

// View toggle
document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    document.getElementById('main-container').className = currentView === 'list' ? 'main list' : 'main';
    render();
  });
});

// Search
document.getElementById('search').addEventListener('input', render);
document.getElementById('sort-select').addEventListener('change', render);

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeAddModal(); }
  if (e.key === '/' && !e.target.closest('input, textarea')) { e.preventDefault(); document.getElementById('search').focus(); }
});

// Utility
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// INIT
// ============================================================
render();
</script>
</body>
</html>
